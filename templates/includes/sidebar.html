<ul class="sidebar-nav list-group">
  {% if user.is_authenticated %}
    <li class="list-group-item">User: <a href="{{ user.get_absolute_url }}">{{ user.get_username }}</a></li>
    <li class="list-group-item">
      <form method="POST" action="{% url 'logout' %}">
      {% csrf_token %}
      <button type="submit" class="logout-btn">Logout</button>
      </form>
    </li>
  {% else %}
    <li class="list-group-item"><a href="{% url 'login'%}?next={{request.path}}">Login</a></li>
  {% endif %}
  <br>

  <li class="list-group-item"><a href="{% url 'project:index' %}">Home</a></li>
  <li class="list-group-item"><a href="{% url 'project:worker-list' %}">All workers</a></li>
  <li class="list-group-item"><a href="{% url 'project:task-list' %}">All tasks</a></li>
  <li class="list-group-item"><a href="{% url 'project:position-list' %}">All positions</a></li>
</ul>
