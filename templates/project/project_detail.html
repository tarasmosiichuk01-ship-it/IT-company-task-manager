{% extends 'base.html' %}

{% block title %}Project detail | IT Task Manager{% endblock %}

{% block content %}
  <h1>
    {{ project.name }}
    <br>
    <a href="{% url 'project:project-update' pk=project.id %}" class="btn btn-secondary link-to-page">
      Update
    </a>
    <a href="{% url 'project:project-delete' pk=project.id %}" class="btn btn-danger link-to-page">
      Delete
    </a>

  </h1>
  <h2>Description:</h2>
  <p>{{ project.description }}</p>
  <h2>
    Tasks
  </h2>
  <hr>
  <ul>
    {% for task in project.tasks.all %}
      <li>
        <a href="{% url 'project:task-detail' pk=task.id %}">
        {{ task.name }}
        </a>
      </li>
    {% endfor %}
  </ul>
{% endblock %}
