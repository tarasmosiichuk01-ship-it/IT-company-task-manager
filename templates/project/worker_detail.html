{% extends "../base.html" %}

{% block content %}
  <h1>
    Username: {{ worker.username }}
    <a href="{% url 'project:worker-delete' pk=worker.id %}" class="btn btn-danger link-to-page">
      Delete
    </a>

    <a href="{% url 'project:worker-update' pk=worker.id %}" class="btn btn-secondary link-to-page">
      Update worker
    </a>
  </h1>

  <p><strong>First name:</strong> {{ worker.first_name }}</p>
  <p><strong>Last name:</strong> {{ worker.last_name }}</p>
  <p><strong>Worker position:</strong> {{ worker.position.name }}</p>
  <p><strong>Is staff:</strong> {{ worker.is_staff }}</p>

{% endblock %}
